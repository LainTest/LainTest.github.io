<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フィボナッチ リトレースメント</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc85;
    --gold-dark: #8a6d2f;
    --bg: #0a0a0c;
    --bg2: #111116;
    --bg3: #18181f;
    --surface: #1e1e28;
    --border: #2a2a38;
    --text: #e8e4d8;
    --text-muted: #7a7568;
    --green: #4caf7d;
    --red: #e05c5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Fibonacci spiral decoration */
  body::after {
    content: 'φ';
    position: fixed;
    right: -0.1em;
    bottom: -0.15em;
    font-size: 28rem;
    font-family: 'DM Mono', monospace;
    color: rgba(201,168,76,0.03);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 2.8rem;
  }

  .phi-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.8;
  }

  .phi-badge::before, .phi-badge::after {
    content: '';
    width: 2rem;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .phi-badge::after {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--text);
    line-height: 1.3;
  }

  h1 em {
    font-style: normal;
    color: var(--gold-light);
    font-weight: 700;
  }

  .subtitle {
    margin-top: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
  }

  /* Input card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2rem;
    margin-bottom: 1.2rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.6;
  }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .input-wrap {
    position: relative;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.85rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }

  .field-icon {
    position: absolute;
    right: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    pointer-events: none;
  }

  /* Direction toggle */
  .direction-wrap {
    margin-top: 1.2rem;
    display: flex;
    gap: 0.6rem;
  }

  .dir-btn {
    flex: 1;
    padding: 0.6rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .dir-btn.active {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Calculate button */
  .calc-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    border: none;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--bg);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 1.4rem;
  }

  .calc-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .calc-btn:active { transform: translateY(0); }

  /* Results */
  .results {
    display: none;
    flex-direction: column;
    gap: 0;
  }

  .results.visible { display: flex; }

  .results-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.8rem;
    padding-left: 0.2rem;
  }

  .level-row {
    display: grid;
    grid-template-columns: 90px 1fr auto;
    align-items: center;
    padding: 1.1rem 1.4rem;
    border: 1px solid var(--border);
    border-bottom: none;
    background: var(--surface);
    gap: 1rem;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .level-row:first-of-type { border-radius: 2px 2px 0 0; }
  .level-row:last-of-type { border-bottom: 1px solid var(--border); border-radius: 0 0 2px 2px; }

  .level-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--level-color, var(--gold));
  }

  .level-row:hover { background: var(--bg3); }

  .level-label {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--level-color, var(--gold));
  }

  .level-bar-wrap {
    position: relative;
    height: 4px;
    background: var(--bg2);
    border-radius: 2px;
    overflow: hidden;
  }

  .level-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--level-color, var(--gold));
    border-radius: 2px;
    opacity: 0.5;
    width: 0;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .level-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text);
    text-align: right;
    min-width: 90px;
  }

  /* Error */
  .error {
    display: none;
    padding: 0.7rem 1rem;
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--red);
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
  }

  .error.visible { display: block; }

  /* Range display */
  .range-info {
    display: none;
    margin-bottom: 0.6rem;
    padding: 0.8rem 1.2rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  .range-info.visible { display: flex; }

  .range-span { color: var(--gold); font-weight: 500; }

  /* Copy hint */
  .level-value { cursor: pointer; }
  .level-value:hover { color: var(--gold-light); }
  .level-value.copied { color: var(--green) !important; transition: color 0.1s; }

  footer {
    text-align: center;
    margin-top: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    opacity: 0.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .level-row { animation: none; }
  .level-row.animate { animation: fadeUp 0.35s ease both; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="phi-badge">φ = 1.618033...</div>
    <h1>フィボナッチ<br><em>リトレースメント</em></h1>
    <p class="subtitle">FIBONACCI RETRACEMENT CALCULATOR</p>
  </header>

  <div class="card">
    <div class="input-grid">
      <div class="field">
        <label>高値 HIGH</label>
        <div class="input-wrap">
          <input type="number" id="high" placeholder="例: 150.50" step="any">
          <span class="field-icon">▲</span>
        </div>
      </div>
      <div class="field">
        <label>安値 LOW</label>
        <div class="input-wrap">
          <input type="number" id="low" placeholder="例: 140.00" step="any">
          <span class="field-icon">▼</span>
        </div>
      </div>
    </div>

    <div class="direction-wrap">
      <button class="dir-btn active" id="btn-down" onclick="setDir('down')">
        ↓ 下降調整
      </button>
      <button class="dir-btn" id="btn-up" onclick="setDir('up')">
        ↑ 上昇調整
      </button>
    </div>

    <div id="error" class="error"></div>
    <button class="calc-btn" onclick="calculate()">CALCULATE ▶</button>
  </div>

  <div id="range-info" class="range-info">
    <span>レンジ幅</span>
    <span class="range-span" id="range-span">—</span>
  </div>

  <div class="results-header">— フィボナッチ水準 —</div>

  <div class="results" id="results">
    <div class="level-row" id="row-618" style="--level-color: #c9a84c;">
      <span class="level-label">61.8%</span>
      <div class="level-bar-wrap"><div class="level-bar" id="bar-618"></div></div>
      <span class="level-value" id="val-618" title="クリックでコピー">—</span>
    </div>
    <div class="level-row" id="row-500" style="--level-color: #8ab4e8;">
      <span class="level-label">50.0%</span>
      <div class="level-bar-wrap"><div class="level-bar" id="bar-500"></div></div>
      <span class="level-value" id="val-500" title="クリックでコピー">—</span>
    </div>
    <div class="level-row" id="row-382" style="--level-color: #7ab87a;">
      <span class="level-label">38.2%</span>
      <div class="level-bar-wrap"><div class="level-bar" id="bar-382"></div></div>
      <span class="level-value" id="val-382" title="クリックでコピー">—</span>
    </div>
  </div>

  <footer>値をクリックするとコピー · TAB で移動 · ENTER で計算</footer>
</div>

<script>
  let direction = 'down'; // 'down' = 上から調整, 'up' = 下から調整

  function setDir(d) {
    direction = d;
    document.getElementById('btn-down').classList.toggle('active', d === 'down');
    document.getElementById('btn-up').classList.toggle('active', d === 'up');
  }

  function fmt(n) {
    // Smart decimal places
    const abs = Math.abs(n);
    let dec = abs >= 1000 ? 2 : abs >= 10 ? 3 : abs >= 1 ? 4 : 5;
    return n.toFixed(dec);
  }

  function calculate() {
    const highEl = document.getElementById('high');
    const lowEl  = document.getElementById('low');
    const errEl  = document.getElementById('error');
    const resEl  = document.getElementById('results');
    const rangeEl = document.getElementById('range-info');

    const high = parseFloat(highEl.value);
    const low  = parseFloat(lowEl.value);

    errEl.classList.remove('visible');
    resEl.classList.remove('visible');
    rangeEl.classList.remove('visible');

    if (isNaN(high) || isNaN(low)) {
      errEl.textContent = '高値と安値を両方入力してください。';
      errEl.classList.add('visible');
      return;
    }
    if (high === low) {
      errEl.textContent = '高値と安値が同じです。異なる値を入力してください。';
      errEl.classList.add('visible');
      return;
    }
    if (high < low) {
      errEl.textContent = '高値は安値より大きい値を入力してください。';
      errEl.classList.add('visible');
      return;
    }

    const range = high - low;
    document.getElementById('range-span').textContent = fmt(range);

    // Fibonacci levels
    const ratios = [0.618, 0.500, 0.382];
    const ids    = ['618', '500', '382'];

    let levels = {};

    ratios.forEach((r, i) => {
      // down: 高値から調整 (support levels)
      // up:   安値からの戻し (resistance levels)
      const val = direction === 'down'
        ? high - range * r
        : low  + range * r;
      levels[ids[i]] = val;
    });

    // Bar widths relative to each other (618 = 100%)
    const maxRatio = 0.618;

    ids.forEach((id, i) => {
      const val = levels[id];
      const pct = (ratios[i] / maxRatio) * 100;

      document.getElementById('val-' + id).textContent = fmt(val);
      document.getElementById('val-' + id).dataset.value = fmt(val);

      // Animate bar
      const bar = document.getElementById('bar-' + id);
      bar.style.width = '0';
      setTimeout(() => { bar.style.width = pct + '%'; }, 80 + i * 60);

      // Row animation
      const row = document.getElementById('row-' + id);
      row.classList.remove('animate');
      void row.offsetWidth;
      row.classList.add('animate');
      row.style.animationDelay = (i * 0.07) + 's';
    });

    resEl.classList.add('visible');
    rangeEl.classList.add('visible');
  }

  // Copy on click
  document.querySelectorAll('.level-value').forEach(el => {
    el.addEventListener('click', () => {
      const v = el.dataset.value;
      if (!v) return;
      navigator.clipboard.writeText(v).then(() => {
        el.classList.add('copied');
        const orig = el.textContent;
        el.textContent = 'COPIED';
        setTimeout(() => {
          el.textContent = orig;
          el.classList.remove('copied');
        }, 900);
      });
    });
  });

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });
</script>
</body>
</html>
