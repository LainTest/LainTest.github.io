
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フィボナッチ リトレースメント</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc85;
    --gold-dark: #8a6d2f;
    --bg: #0a0a0c;
    --bg2: #111116;
    --bg3: #18181f;
    --surface: #1e1e28;
    --border: #2a2a38;
    --text: #e8e4d8;
    --text-muted: #7a7568;
    --green: #4caf7d;
    --red: #e05c5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Fibonacci spiral decoration */
  body::after {
    content: 'φ';
    position: fixed;
    right: -0.1em;
    bottom: -0.15em;
    font-size: 28rem;
    font-family: 'DM Mono', monospace;
    color: rgba(201,168,76,0.03);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 2.8rem;
  }

  .phi-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.8;
  }

  .phi-badge::before, .phi-badge::after {
    content: '';
    width: 2rem;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .phi-badge::after {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--text);
    line-height: 1.3;
  }

  h1 em {
    font-style: normal;
    color: var(--gold-light);
    font-weight: 700;
  }

  .subtitle {
    margin-top: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
  }

  /* Mode radio */
  .mode-wrap {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.6rem;
  }

  .mode-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.65rem 1rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .mode-btn input[type="radio"] { display: none; }

  .mode-btn .radio-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--text-muted);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .mode-btn.active {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,0.08);
  }
  .mode-btn.active .radio-dot {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 6px rgba(201,168,76,0.5);
  }

  .mode-desc {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 1.6rem;
    opacity: 0.6;
  }

  /* Input card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2rem;
    margin-bottom: 1.2rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.6;
  }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .input-wrap {
    position: relative;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.85rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }

  .field-icon {
    position: absolute;
    right: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    pointer-events: none;
  }

  /* Direction toggle */
  .direction-wrap {
    margin-top: 1.2rem;
    display: flex;
    gap: 0.6rem;
  }

  .dir-btn {
    flex: 1;
    padding: 0.6rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .dir-btn.active {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* Calculate button */
  .calc-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    border: none;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--bg);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 1.4rem;
  }

  .calc-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .calc-btn:active { transform: translateY(0); }

  /* Results */
  .results {
    display: none;
    flex-direction: column;
    gap: 0;
  }

  .results.visible { display: flex; }

  .results-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.8rem;
    padding-left: 0.2rem;
  }

  .level-row {
    display: grid;
    grid-template-columns: 130px 1fr auto;
    align-items: center;
    padding: 1.1rem 1.4rem;
    border: 1px solid var(--border);
    border-bottom: none;
    background: var(--surface);
    gap: 1rem;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .level-row:first-of-type { border-radius: 2px 2px 0 0; }
  .level-row:last-of-type { border-bottom: 1px solid var(--border); border-radius: 0 0 2px 2px; }

  .level-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--level-color, var(--gold));
  }

  .level-row:hover { background: var(--bg3); }

  .level-label {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--level-color, var(--gold));
  }

  .level-bar-wrap {
    position: relative;
    height: 4px;
    background: var(--bg2);
    border-radius: 2px;
    overflow: hidden;
  }

  .level-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--level-color, var(--gold));
    border-radius: 2px;
    opacity: 0.5;
    width: 0;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .level-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text);
    text-align: right;
    min-width: 90px;
  }

  /* Error */
  .error {
    display: none;
    padding: 0.7rem 1rem;
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--red);
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
  }

  .error.visible { display: block; }

  /* Range display */
  .range-info {
    display: none;
    margin-bottom: 0.6rem;
    padding: 0.8rem 1.2rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  .range-info.visible { display: flex; }

  .range-span { color: var(--gold); font-weight: 500; }

  /* Copy hint */
  .level-left { display: flex; align-items: center; gap: 0.5rem; }

  .level-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    padding: 0.15rem 0.45rem;
    border-radius: 2px;
    white-space: nowrap;
    opacity: 0.85;
  }
  .tag-entry { background: rgba(138,180,232,0.15); color: #8ab4e8; border: 1px solid rgba(138,180,232,0.3); }
  .tag-tp1   { background: rgba(224,92,92,0.15);   color: #e05c5c; border: 1px solid rgba(224,92,92,0.3); }
  .tag-tp2   { background: rgba(255,140,105,0.12); color: #ff8c69; border: 1px solid rgba(255,140,105,0.25); }
  .tag-sl    { background: rgba(155,127,212,0.15); color: #b49ee0; border: 1px solid rgba(155,127,212,0.3); }
  .tag-ret   { background: rgba(201,168,76,0.1);   color: #c9a84c; border: 1px solid rgba(201,168,76,0.2); }

  .level-value { cursor: pointer; }
  .level-value:hover { color: var(--gold-light); }
  .level-value.copied { color: var(--green) !important; transition: color 0.1s; }

  footer {
    text-align: center;
    margin-top: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    opacity: 0.5;
  }

  #row-500  { --level-rgb: 138, 180, 232; }
  #row-1000 { --level-rgb: 224,  92,  92; }
  #row-000  { --level-rgb: 155, 127, 212; }

  .row-bold {
    background: linear-gradient(90deg, rgba(var(--level-rgb), 0.07) 0%, transparent 100%);
    border-color: rgba(var(--level-rgb), 0.35) !important;
  }
  .row-bold::before { width: 4px; opacity: 1; box-shadow: 0 0 8px rgba(var(--level-rgb), 0.7); }
  .row-bold .level-label { font-size: 1.05rem; color: var(--level-color); filter: brightness(1.3); }
  .row-bold .level-value { font-size: 1.25rem; color: var(--level-color); filter: brightness(1.3); }
  .row-bold .level-bar { opacity: 0.75; height: 5px; }
  .row-bold:hover { background: linear-gradient(90deg, rgba(var(--level-rgb), 0.12) 0%, transparent 100%); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .level-row { animation: none; }
  .level-row.animate { animation: fadeUp 0.35s ease both; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="phi-badge">φ = 1.618033...</div>
    <h1>フィボナッチ<br><em>リトレースメント</em></h1>
    <p class="subtitle">FIBONACCI RETRACEMENT CALCULATOR</p>
  </header>

  <div class="mode-wrap">
    <label class="mode-btn active" id="mode-btn-basic" onclick="setMode('basic')">
      <input type="radio" name="mode" value="basic" checked>
      <span class="radio-dot"></span>
      BASIC
    </label>
    <label class="mode-btn" id="mode-btn-expert" onclick="setMode('expert')">
      <input type="radio" name="mode" value="expert">
      <span class="radio-dot"></span>
      EXPERT
    </label>
  </div>

  <div class="card">
    <div class="input-grid">
      <div class="field">
        <label>高値 HIGH</label>
        <div class="input-wrap">
          <input type="number" id="high" placeholder="例: 150.50" step="any">
          <span class="field-icon">▲</span>
        </div>
      </div>
      <div class="field">
        <label>安値 LOW</label>
        <div class="input-wrap">
          <input type="number" id="low" placeholder="例: 140.00" step="any">
          <span class="field-icon">▼</span>
        </div>
      </div>
    </div>

    <div class="direction-wrap">
      <button class="dir-btn" id="btn-down" onclick="setDir('down')">
        ↓ ショート（売り）
      </button>
      <button class="dir-btn active" id="btn-up" onclick="setDir('up')">
        ↑ ロング（買い）
      </button>
    </div>

    <div id="error" class="error"></div>
    <button class="calc-btn" onclick="calculate()">CALCULATE ▶</button>
  </div>

  <div id="range-info" class="range-info">
    <span>レンジ幅</span>
    <span class="range-span" id="range-span">—</span>
  </div>

  <div class="results-header" id="results-label" style="display:none;">— フィボナッチ水準 —</div>

  <div class="results" id="results">

    <!-- 利確ポイント 123.6% -->
    <div class="level-row" id="row-1236" style="--level-color: #ff8c69;">
      <div class="level-left">
        <span class="level-label">123.6%</span>
        <span class="level-tag tag-tp2">利確②</span>
      </div>
      <div class="level-bar-wrap"><div class="level-bar" id="bar-1236"></div></div>
      <span class="level-value" id="val-1236" title="クリックでコピー">—</span>
    </div>

    <!-- 利確ポイント 100% row-bold -->
    <div class="level-row row-bold" id="row-1000" style="--level-color: #e05c5c; --level-rgb: 224,92,92;">
      <div class="level-left">
        <span class="level-label">100%</span>
        <span class="level-tag tag-tp1">利確①</span>
      </div>
      <div class="level-bar-wrap"><div class="level-bar" id="bar-1000"></div></div>
      <span class="level-value" id="val-1000" title="クリックでコピー">—</span>
    </div>

    <!-- リトレースメント 61.8% -->
    <div class="level-row" id="row-618" style="--level-color: #c9a84c;">
      <div class="level-left">
        <span class="level-label">61.8%</span>
        <span class="level-tag tag-ret" id="tag-618">調整①</span>
      </div>
      <div class="level-bar-wrap"><div class="level-bar" id="bar-618"></div></div>
      <span class="level-value" id="val-618" title="クリックでコピー">—</span>
    </div>

    <!-- エントリーポイント 50% row-bold -->
    <div class="level-row row-bold" id="row-500" style="--level-color: #8ab4e8; --level-rgb: 138,180,232;">
      <div class="level-left">
        <span class="level-label">50.0%</span>
        <span class="level-tag tag-entry">エントリー</span>
      </div>
      <div class="level-bar-wrap"><div class="level-bar" id="bar-500"></div></div>
      <span class="level-value" id="val-500" title="クリックでコピー">—</span>
    </div>

    <!-- リトレースメント 38.2% -->
    <div class="level-row" id="row-382" style="--level-color: #7ab87a;">
      <div class="level-left">
        <span class="level-label">38.2%</span>
        <span class="level-tag tag-ret" id="tag-382">調整②</span>
      </div>
      <div class="level-bar-wrap"><div class="level-bar" id="bar-382"></div></div>
      <span class="level-value" id="val-382" title="クリックでコピー">—</span>
    </div>

    <!-- 損切ポイント 0% -->
    <div class="level-row row-bold" id="row-000" style="--level-color: #9b7fd4; --level-rgb: 155,127,212;">
      <div class="level-left">
        <span class="level-label">0%</span>
        <span class="level-tag tag-sl">損切</span>
      </div>
      <div class="level-bar-wrap"><div class="level-bar" id="bar-000"></div></div>
      <span class="level-value" id="val-000" title="クリックでコピー">—</span>
    </div>

  </div>

  <footer>値をクリックするとコピー · TAB で移動 · ENTER で計算</footer>
</div>

<script>
  let direction = 'up';
  let mode = 'basic';

  function setMode(m) {
    mode = m;
    document.getElementById('mode-btn-basic').classList.toggle('active', m === 'basic');
    document.getElementById('mode-btn-expert').classList.toggle('active', m === 'expert');
    // Re-apply visibility if results already shown
    if (document.getElementById('results').classList.contains('visible')) {
      applyModeVisibility();
    }
  }

  function applyModeVisibility() {
    const isBasic = mode === 'basic';
    // BASIC: hide 123.6%, 61.8%, 38.2%
    // EXPERT: show all
    document.getElementById('row-1236').style.display = isBasic ? 'none' : '';
    document.getElementById('row-618').style.display  = isBasic ? 'none' : '';
    document.getElementById('row-382').style.display  = isBasic ? 'none' : '';

    // Update tag labels for 61.8% and 38.2% in expert
    document.getElementById('tag-618').textContent = 'エントリー調整①';
    document.getElementById('tag-382').textContent = 'エントリー調整②';
  }

  function setDir(d) {
    direction = d;
    document.getElementById('btn-down').classList.toggle('active', d === 'down');
    document.getElementById('btn-up').classList.toggle('active', d === 'up');
  }

  function fmt(n) {
    // Smart decimal places
    const abs = Math.abs(n);
    let dec = abs >= 1000 ? 2 : abs >= 10 ? 3 : abs >= 1 ? 4 : 5;
    return n.toFixed(dec);
  }

  function calculate() {
    const highEl = document.getElementById('high');
    const lowEl  = document.getElementById('low');
    const errEl  = document.getElementById('error');
    const resEl  = document.getElementById('results');
    const rangeEl = document.getElementById('range-info');

    const high = parseFloat(highEl.value);
    const low  = parseFloat(lowEl.value);

    errEl.classList.remove('visible');
    resEl.classList.remove('visible');
    rangeEl.classList.remove('visible');
    document.getElementById('results-label').style.display = 'none';

    if (isNaN(high) || isNaN(low)) {
      errEl.textContent = '高値と安値を両方入力してください。';
      errEl.classList.add('visible');
      return;
    }
    if (high === low) {
      errEl.textContent = '高値と安値が同じです。異なる値を入力してください。';
      errEl.classList.add('visible');
      return;
    }
    if (high < low) {
      errEl.textContent = '高値は安値より大きい値を入力してください。';
      errEl.classList.add('visible');
      return;
    }

    const range = high - low;
    document.getElementById('range-span').textContent = fmt(range);

    // All levels: [ratio, elementId]
    // 0% = stoploss (low for long, high for short)
    // 38.2%, 50%, 61.8% = retracement
    // 100%, 123.6% = profit targets
    const allLevels = [
      { r: 0,     id: '000'  },
      { r: 0.382, id: '382'  },
      { r: 0.500, id: '500'  },
      { r: 0.618, id: '618'  },
      { r: 1.000, id: '1000' },
      { r: 1.236, id: '1236' },
    ];

    allLevels.forEach(({ r, id }, i) => {
      const val = direction === 'down'
        ? high - range * r   // short: 高値起点
        : low  + range * r;  // long:  安値起点

      document.getElementById('val-' + id).textContent = fmt(val);
      document.getElementById('val-' + id).dataset.value = fmt(val);

      const bar = document.getElementById('bar-' + id);
      bar.style.width = '0';
      const pct = Math.min((r / 1.236) * 100, 100);
      setTimeout(() => { bar.style.width = pct + '%'; }, 80 + i * 50);

      const row = document.getElementById('row-' + id);
      row.classList.remove('animate');
      void row.offsetWidth;
      row.classList.add('animate');
      row.style.animationDelay = (i * 0.06) + 's';
    });

    resEl.classList.add('visible');
    rangeEl.classList.add('visible');
    document.getElementById('results-label').style.display = 'block';

    // ロング: 上から 123.6% > 100% > 61.8% > 50% > 38.2% > 0%（高い値が上）
    // ショート: 上から 0% > 38.2% > 50% > 61.8% > 100% > 123.6%（低い値が上）
    const orderLong  = ['1236','1000','618','500','382','000'];
    const orderShort = ['000','382','500','618','1000','1236'];
    const order = direction === 'up' ? orderLong : orderShort;
    order.forEach(id => resEl.appendChild(document.getElementById('row-' + id)));

    applyModeVisibility();

  }

  // Copy on click — covers all .level-value elements including profit rows
  function bindCopy() {
    document.querySelectorAll('.level-value').forEach(el => {
      el.removeEventListener('click', el._copyHandler);
      el._copyHandler = () => {
        const v = el.dataset.value;
        if (!v) return;
        navigator.clipboard.writeText(v).then(() => {
          el.classList.add('copied');
          const orig = el.textContent;
          el.textContent = 'COPIED';
          setTimeout(() => {
            el.textContent = orig;
            el.classList.remove('copied');
          }, 900);
        });
      };
      el.addEventListener('click', el._copyHandler);
    });
  }
  bindCopy();

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });
</script>
</body>
</html>
