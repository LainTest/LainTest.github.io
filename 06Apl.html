<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体部位 暗記確認アプリ（消化器系）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f3f0f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .description {
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        /* 画像とマスクを包む相対配置のコンテナ */
        .quiz-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
        }
        .quiz-container img {
            display: block;
            max-width: 100%;
            height: auto;
            width: 600px; /* 全画面共通の標準サイズ */
        }
        /* マスク（目隠し）のスタイル */
        .mask {
            position: absolute;
            background-color: #1a1a1a;
            border: 1px solid #444;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 11px;
            user-select: none;
            box-shadow: inset 0 0 4px rgba(255,255,255,0.2);
        }
        /* ホバー時に少し明るく */
        .mask:hover {
            background-color: #333;
            transform: scale(1.02);
        }
        /* 正解してマスクが解除された状態 */
        .mask.correct {
            background-color: rgba(40, 167, 69, 0.15); /* 消化器はフレッシュなグリーンに */
            border: 1px solid #28a745;
            color: #28a745;
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>体部位 暗記確認ツール（消化器系）</h1>
    <p class="description">黒いマスクをクリックして、正しい臓器や部位の名前を答えてください！</p>

    <div class="quiz-container" id="quizContainer">
        <img src="12248.jpg" alt="消化器系">
    </div>

<script>
// 消化器系の座標データに、ID・名前・読みをマッピング
const maskData = [
    // 右側（画面向かって右）
    { "id": 1, "name": "耳下腺", "reading": "じかせん", "x": 63.3, "y": 20.5, "width": 12.7, "height": 6 },
    { "id": 2, "name": "咽頭", "reading": "いんとう", "x": 62.8, "y": 27.9, "width": 9.5, "height": 5.6 },
    { "id": 3, "name": "食道", "reading": "しょくどう", "x": 78.5, "y": 43.6, "width": 7.5, "height": 4.8 },
    { "id": 4, "name": "噴門", "reading": "ふんもん", "x": 78.3, "y": 52.6, "width": 7.8, "height": 4.6 },
    { "id": 5, "name": "胃", "reading": "い", "x": 77.2, "y": 59.4, "width": 5.3, "height": 4 },
    { "id": 6, "name": "膵臓", "reading": "すいぞう", "x": 77.3, "y": 65.6, "width": 6.7, "height": 4.1 },
    { "id": 7, "name": "横行結腸", "reading": "おうこうけっちょう", "x": 77.5, "y": 69.3, "width": 12.2, "height": 3.6 },
    { "id": 8, "name": "上行結腸", "reading": "じょうこうけっちょう", "x": 76, "y": 72.5, "width": 12.7, "height": 3.6 },
    { "id": 9, "name": "下行結腸", "reading": "かこうけっちょう", "x": 77.2, "y": 76.1, "width": 11.7, "height": 3.3 },
    { "id": 10, "name": "盲腸", "reading": "もうちょう", "x": 77, "y": 78.8, "width": 6.5, "height": 3 },
    { "id": 11, "name": "S状結腸", "reading": "えすじょうけっちょう", "x": 76.2, "y": 81.8, "width": 12, "height": 3.4 },
    { "id": 12, "name": "直腸", "reading": "ちょくちょう", "x": 76.5, "y": 84.8, "width": 6.8, "height": 3 },
    { "id": 13, "name": "肛門", "reading": "こうもん", "x": 77.2, "y": 87.4, "width": 6.3, "height": 2.6 },
    { "id": 14, "name": "虫垂", "reading": "ちゅうすい", "x": 75.8, "y": 89.4, "width": 7.5, "height": 4 },

    // 左側（画面向かって左）
    { "id": 15, "name": "舌", "reading": "ぜつ", "x": 6.5, "y": 25.3, "width": 5.2, "height": 4.4 },
    { "id": 16, "name": "口腔", "reading": "こうくう", "x": 6.7, "y": 30.5, "width": 7.3, "height": 4.5 },
    { "id": 17, "name": "顎下腺", "reading": "がくかせん", "x": 4.8, "y": 34.5, "width": 10.3, "height": 3.6 },
    { "id": 18, "name": "舌下腺", "reading": "ぜっかせん", "x": 9.5, "y": 37.8, "width": 9.8, "height": 4 },
    { "id": 19, "name": "横隔膜", "reading": "おうかくまく", "x": 2.8, "y": 50.9, "width": 7.3, "height": 4.9 },
    { "id": 20, "name": "肝臓", "reading": "かんぞう", "x": 4.5, "y": 56, "width": 6.2, "height": 3.8 },
    { "id": 21, "name": "肝管", "reading": "かんかん", "x": 4.2, "y": 59.5, "width": 6.3, "height": 3.6 },
    { "id": 22, "name": "胆嚢", "reading": "たんのう", "x": 5, "y": 62.8, "width": 6.3, "height": 4 },
    { "id": 23, "name": "十二指腸", "reading": "じゅうにしちょう", "x": 0.5, "y": 65.5, "width": 11.7, "height": 5.4 },
    { "id": 24, "name": "空腸", "reading": "くうちょう", "x": 4.8, "y": 71, "width": 6.8, "height": 5.1 },
    { "id": 25, "name": "回腸", "reading": "かいちょう", "x": 5, "y": 76.5, "width": 7, "height": 4.9 }
];

const container = document.getElementById('quizContainer');

// マスクを画面上に配置
maskData.forEach(data => {
    const mask = document.createElement('div');
    mask.classList.add('mask');
    
    mask.style.left = `${data.x}%`;
    mask.style.top = `${data.y}%`;
    mask.style.width = `${data.width}%`;
    mask.style.height = `${data.height}%`;
    mask.textContent = data.id;

    // クイズ判定ロジック
    mask.addEventListener('click', () => {
        const userAnswer = prompt(`問題 [No.${data.id}]\nこの部位・臓器の名前を入力してください。\n（漢字またはひらがな）`);
        
        if (userAnswer === null) return; 

        // 入力の前後の空白を削除
        const cleanAnswer = userAnswer.trim();

        // 正誤判定
        const isCorrect = (cleanAnswer === data.name || cleanAnswer === data.reading);

        if (isCorrect) {
            alert('✨ 正解です！ ✨');
            mask.classList.add('correct');
            mask.textContent = data.name;
        } else {
            alert(`❌ 残念！不正解です。\nもう一度挑戦してみましょう！`);
        }
    });

    container.appendChild(mask);
});
</script>

</body>
</html>
